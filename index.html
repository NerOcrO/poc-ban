<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de distance</title>

    <!-- DSFR -->
    <link rel="stylesheet" href="/dsfr-1.14.2/dsfr.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        #map {
            height: 400px;
            width: 100%;
            margin-top: 1rem;
            border-radius: 4px;
        }
        .distance-result {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-title-blue-france);
            padding: 1rem;
            background-color: var(--background-contrast-info);
            border-radius: 4px;
            text-align: center;
        }
        .fr-stepper__title {
            font-size: 1.125rem;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        .coords-success {
            color: var(--text-default-success) !important;
        }
        /* Autocomplete dropdown */
        .autocomplete-container {
            position: relative;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-default-grey);
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-default-grey);
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover,
        .autocomplete-item.active {
            background-color: var(--background-alt-blue-france);
        }
        /* Loader spinner */
        .btn-loader {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fr-btn[disabled] {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <main class="fr-container fr-py-4w">
        <h1>Calculateur de distance</h1>

        <div class="fr-grid-row fr-grid-row--gutters">
            <!-- Étape 1 : Adresse -->
            <div class="fr-col-12">
                <div class="fr-card fr-card--no-border">
                    <div class="fr-card__body">
                        <div class="fr-card__content">
                            <div class="fr-stepper__title">
                                <span class="fr-badge fr-badge--blue-cumulus fr-mr-1w">1</span>
                                Adresse à rechercher
                            </div>
                            <div class="fr-input-group fr-mt-2w">
                                <label class="fr-label" for="address-input">
                                    Adresse postale
                                    <span class="fr-hint-text">Entrez une adresse française</span>
                                </label>
                                <div class="autocomplete-container">
                                    <input class="fr-input" type="text" id="address-input" placeholder="Ex: 20 avenue de Ségur, Paris" autocomplete="off">
                                    <div class="autocomplete-list" id="autocomplete-list" style="display: none;"></div>
                                </div>
                            </div>
                            <p id="address-coords" class="fr-text--sm fr-mt-1w" style="color: var(--text-mention-grey);">Aucune adresse sélectionnée</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Étape 2 : Géolocalisation -->
            <div class="fr-col-12">
                <div class="fr-card fr-card--no-border">
                    <div class="fr-card__body">
                        <div class="fr-card__content">
                            <div class="fr-stepper__title">
                                <span class="fr-badge fr-badge--blue-cumulus fr-mr-1w">2</span>
                                Votre position
                            </div>
                            <p class="fr-text--sm fr-mt-2w fr-mb-2w" style="color: var(--text-mention-grey);">Cliquez sur le bouton pour obtenir votre position actuelle</p>
                            <button class="fr-btn" id="geoloc-btn">
                                Me géolocaliser
                            </button>
                            <p id="user-coords" class="fr-text--sm fr-mt-1w" style="color: var(--text-mention-grey);">Position non définie</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Carte -->
            <div class="fr-col-12">
                <div id="map"></div>
            </div>

            <!-- Résultat distance -->
            <div class="fr-col-12" id="distance-result" style="display: none;">
                <div class="distance-result">
                    Distance : <span id="distance-value"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialisation de la carte centrée sur la France
        const map = L.map('map').setView([46.603354, 1.888334], 6);

        // Fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Marqueurs
        let addressMarker = null;
        let userMarker = null;
        let distanceLine = null;

        // Coordonnées
        let addressCoords = null;
        let userCoords = null;

        // Icône personnalisée pour l'utilisateur (verte)
        const userIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Icône pour l'adresse (bleue par défaut)
        const addressIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Références éléments
        const geolocBtn = document.getElementById('geoloc-btn');
        const addressInput = document.getElementById('address-input');
        const autocompleteList = document.getElementById('autocomplete-list');

        // Texte original du bouton
        const geolocBtnText = geolocBtn.innerHTML;

        // Debounce pour l'autocomplétion
        let debounceTimer = null;
        let currentFocus = -1;

        // Fonction pour afficher/masquer le loader
        function setLoading(button, isLoading, originalText) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = `<span class="btn-loader"><span class="spinner"></span>Chargement...</span>`;
            } else {
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }

        // Autocomplétion - recherche des suggestions
        async function fetchSuggestions(query) {
            if (query.length < 3) {
                autocompleteList.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();

                if (data.features && data.features.length > 0) {
                    displaySuggestions(data.features);
                } else {
                    autocompleteList.style.display = 'none';
                }
            } catch (error) {
                console.error('Erreur autocomplétion:', error);
                autocompleteList.style.display = 'none';
            }
        }

        // Afficher les suggestions
        function displaySuggestions(features) {
            autocompleteList.innerHTML = '';
            currentFocus = -1;

            features.forEach((feature, index) => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.textContent = feature.properties.label;
                item.dataset.index = index;
                item.dataset.lat = feature.geometry.coordinates[1];
                item.dataset.lng = feature.geometry.coordinates[0];
                item.dataset.label = feature.properties.label;

                item.addEventListener('click', () => selectSuggestion(item));
                autocompleteList.appendChild(item);
            });

            autocompleteList.style.display = 'block';
        }

        // Sélectionner une suggestion
        function selectSuggestion(item) {
            const lat = parseFloat(item.dataset.lat);
            const lng = parseFloat(item.dataset.lng);
            const label = item.dataset.label;

            addressInput.value = label;
            autocompleteList.style.display = 'none';

            // Mettre à jour les coordonnées et la carte
            setAddressLocation(lat, lng, label);
        }

        // Mettre à jour la position de l'adresse
        function setAddressLocation(lat, lng, label) {
            addressCoords = { lat, lng };

            const addressCoordsEl = document.getElementById('address-coords');
            addressCoordsEl.textContent = `${label} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
            addressCoordsEl.classList.add('coords-success');

            if (addressMarker) {
                map.removeLayer(addressMarker);
            }
            addressMarker = L.marker([lat, lng], { icon: addressIcon })
                .addTo(map)
                .bindPopup(`<strong>Adresse</strong><br>${label}`)
                .openPopup();

            updateMapView();
            calculateDistance();
        }

        // Navigation clavier dans l'autocomplétion
        function handleAutocompleteKeydown(e) {
            const items = autocompleteList.querySelectorAll('.autocomplete-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentFocus++;
                if (currentFocus >= items.length) currentFocus = 0;
                setActiveItem(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentFocus--;
                if (currentFocus < 0) currentFocus = items.length - 1;
                setActiveItem(items);
            } else if (e.key === 'Enter' && currentFocus > -1) {
                e.preventDefault();
                items[currentFocus].click();
            } else if (e.key === 'Escape') {
                autocompleteList.style.display = 'none';
            }
        }

        function setActiveItem(items) {
            items.forEach(item => item.classList.remove('active'));
            if (currentFocus >= 0 && currentFocus < items.length) {
                items[currentFocus].classList.add('active');
            }
        }

        // Event listener pour l'autocomplétion
        addressInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                fetchSuggestions(e.target.value.trim());
            }, 300);
        });

        addressInput.addEventListener('keydown', handleAutocompleteKeydown);

        // Fermer l'autocomplétion si clic en dehors
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-container')) {
                autocompleteList.style.display = 'none';
            }
        });

        // Géolocalisation de l'utilisateur
        function getUserLocation() {
            if (!navigator.geolocation) {
                alert('La géolocalisation n\'est pas supportée par votre navigateur');
                return;
            }

            setLoading(geolocBtn, true, geolocBtnText);

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    userCoords = { lat, lng };

                    // Mise à jour de l'affichage
                    const userCoordsEl = document.getElementById('user-coords');
                    userCoordsEl.textContent = `Position : ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    userCoordsEl.classList.add('coords-success');

                    // Mise à jour du marqueur
                    if (userMarker) {
                        map.removeLayer(userMarker);
                    }
                    userMarker = L.marker([lat, lng], { icon: userIcon })
                        .addTo(map)
                        .bindPopup('<strong>Votre position</strong>')
                        .openPopup();

                    updateMapView();
                    calculateDistance();
                    setLoading(geolocBtn, false, geolocBtnText);
                },
                (error) => {
                    console.error('Erreur géolocalisation:', error);
                    let message = 'Erreur de géolocalisation';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            message = 'Vous avez refusé la géolocalisation';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = 'Position indisponible';
                            break;
                        case error.TIMEOUT:
                            message = 'Délai d\'attente dépassé';
                            break;
                    }
                    alert(message);
                    setLoading(geolocBtn, false, geolocBtnText);
                }
            );
        }

        // Calcul de distance avec formule Haversine
        function calculateDistance() {
            if (!addressCoords || !userCoords) {
                document.getElementById('distance-result').style.display = 'none';
                return;
            }

            const R = 6371; // Rayon de la Terre en km
            const dLat = toRad(userCoords.lat - addressCoords.lat);
            const dLng = toRad(userCoords.lng - addressCoords.lng);
            const lat1 = toRad(addressCoords.lat);
            const lat2 = toRad(userCoords.lat);

            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.sin(dLng / 2) * Math.sin(dLng / 2) * Math.cos(lat1) * Math.cos(lat2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;

            // Affichage formaté
            let displayDistance;
            if (distance < 1) {
                displayDistance = `${Math.round(distance * 1000)} m`;
            } else {
                displayDistance = `${distance.toFixed(2)} km`;
            }

            document.getElementById('distance-value').textContent = displayDistance;
            document.getElementById('distance-result').style.display = 'block';

            // Tracé de la ligne entre les deux points
            if (distanceLine) {
                map.removeLayer(distanceLine);
            }
            distanceLine = L.polyline([
                [addressCoords.lat, addressCoords.lng],
                [userCoords.lat, userCoords.lng]
            ], { color: '#000091', weight: 3, dashArray: '10, 10' }).addTo(map);
        }

        function toRad(deg) {
            return deg * (Math.PI / 180);
        }

        // Ajustement de la vue pour voir les deux marqueurs
        function updateMapView() {
            const markers = [];
            if (addressCoords) markers.push([addressCoords.lat, addressCoords.lng]);
            if (userCoords) markers.push([userCoords.lat, userCoords.lng]);

            if (markers.length === 1) {
                map.setView(markers[0], 14);
            } else if (markers.length === 2) {
                const bounds = L.latLngBounds(markers);
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        // Event listener pour le bouton géolocalisation
        geolocBtn.addEventListener('click', getUserLocation);
    </script>
</body>
</html>
